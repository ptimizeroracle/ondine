name: "product_enrichment_pipeline"
version: "1.0"

dataset:
  source_type: "csv"
  source_path: "OVERRIDE_IN_CODE"
  input_columns:
    - "name"
    - "description"
  output_columns:
    - "category"
    - "sentiment"
  delimiter: ","
  encoding: "utf-8"

prompt:
  template: |
    Analyze this product and return a JSON object.

    Product name: {{ name }}
    Description: {{ description }}

    Return ONLY valid JSON in this exact format:
    {"category": "<Electronics|Fitness|Kitchen|Office|Nutrition>", "sentiment": "<positive|neutral|negative>"}
  system_message: "You are a product catalog expert. Return valid JSON only."
  response_format: "json"

llm:
  provider: "groq"
  model: "groq/openai/gpt-oss-20b"
  temperature: 0.0
  max_tokens: 100
  input_cost_per_1k_tokens: "0.0001"
  output_cost_per_1k_tokens: "0.0001"

processing:
  batch_size: 5
  concurrency: 2
  max_retries: 2
  retry_delay: 1.0
  error_policy: "skip"
  rate_limit_rpm: 30
  max_budget: "0.50"

output:
  destination_type: "csv"
  destination_path: "OVERRIDE_IN_CODE"
  merge_strategy: "replace"
  atomic_write: true

metadata:
  project: "ondine-integration-demo"
  owner: "ondine"
