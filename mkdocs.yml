site_name: Ondine Documentation
site_description: SDK for processing tabular datasets with LLMs
site_url: https://ptimizeroracle.github.io/ondine
repo_url: https://github.com/ptimizeroracle/ondine
repo_name: ptimizeroracle/ondine
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: README.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - Core Concepts: getting-started/core-concepts.md
  - Guides:
      - Execution Modes: guides/execution-modes.md
      - Structured Output: guides/structured-output.md
      - Cost Control: guides/cost-control.md
      - Batch Processing: guides/batch-processing.md
      - Multi-Column Processing: guides/multi-column.md
      - Pipeline Composition: guides/pipeline-composition.md
      - Observability: guides/observability_profiling.md
      - Azure Managed Identity: guides/azure-managed-identity.md
      - Providers:
          - OpenAI: guides/providers/openai.md
          - Anthropic Claude: guides/providers/anthropic.md
          - Groq: guides/providers/groq.md
          - Azure OpenAI: guides/providers/azure.md
          - Local MLX: guides/providers/local-mlx.md
          - Custom APIs: guides/providers/custom.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ptimizeroracle/ondine
  version:
    provider: mike

extra_css: []
extra_javascript: []

# Copy assets to site
docs_dir: docs
site_dir: site

# Include assets directory
watch:
  - ondine/
