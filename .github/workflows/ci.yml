name: CI

on:
  push:
    branches: [ '**' ]  # Run on all branches
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  install-profiles:
    name: Install Profile (${{ matrix.profile }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        profile: [core, observability, all]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Install maturin
      run: pip install maturin

    - name: Install package profile
      shell: bash
      run: |
        if [ "${{ matrix.profile }}" = "core" ]; then
          pip install .
        elif [ "${{ matrix.profile }}" = "observability" ]; then
          pip install ".[observability]"
        else
          pip install ".[all]"
        fi

    - name: Smoke test profile
      shell: bash
      run: |
        python -c "import ondine; print(ondine.__version__)"
        if [ "${{ matrix.profile }}" = "observability" ]; then
          python -c "from ondine.observability import disable_tracing, enable_tracing; enable_tracing(exporter='console'); disable_tracing()"
        elif [ "${{ matrix.profile }}" = "all" ]; then
          python -c "from ondine.observability import disable_tracing, enable_tracing; from ondine.utils.metrics_exporter import PrometheusMetrics; enable_tracing(exporter='console'); disable_tracing(); PrometheusMetrics(port=0)"
        fi

  # Quick checks for feature branches - runs on every push
  quick-check:
    name: Quick Check (Lint + Unit Tests)
    runs-on: ubuntu-latest
    # Only run on feature branches (not main/develop)
    if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Install dependencies + build Rust extension
      run: |
        uv sync --extra dev --extra observability --extra excel --extra parquet --extra knowledge
        uv pip install maturin
        uv run maturin develop

    - name: Run Rust tests
      run: cargo test -p ondine-core

    - name: Run linter
      run: |
        uv run ruff check ondine/ tests/

    - name: Run formatter check
      run: |
        uv run ruff format --check ondine/ tests/

    - name: Run unit tests only
      run: |
        uv run pytest tests/unit/ -v --tb=short

  # Full test suite for main/develop/PRs
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Run on main, develop, or PRs
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Install dependencies + build Rust extension
      run: |
        uv sync --extra dev --extra observability --extra excel --extra parquet --extra knowledge
        uv pip install maturin
        uv run maturin develop

    - name: Run Rust tests
      run: cargo test -p ondine-core

    - name: Run linter
      run: |
        uv run ruff check ondine/ tests/

    - name: Run type checker
      run: |
        uv run mypy ondine/

    - name: Run unit tests
      env:
        CUDA_VISIBLE_DEVICES: ""
        PYTORCH_MPS_HIGH_WATERMARK_RATIO: "0.0"
      run: |
        uv run pytest tests/unit/ -v --tb=short

    - name: Run integration tests (main branch only)
      if: github.ref == 'refs/heads/main' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        uv run pytest tests/integration/ -v --tb=short

    - name: Run all tests with coverage
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        uv run pytest --cov=ondine --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  # Verify compatibility with pandas 1.5.x (minimum supported version)
  test-pandas-compat:
    name: Test pandas 1.5 compatibility
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Install with pandas 1.5 + build Rust extension
      run: |
        uv sync --extra dev --extra excel --extra parquet --extra knowledge
        uv pip install maturin
        uv run maturin develop
        uv pip install "pandas==1.5.3" "numpy<1.24" --force-reinstall

    - name: Verify pandas version
      run: |
        uv run --no-sync python -c "import pandas; print(f'pandas {pandas.__version__}'); assert pandas.__version__.startswith('1.5'), f'Expected pandas 1.5.x, got {pandas.__version__}'"

    - name: Run unit tests (skip observability — unrelated to pandas compat)
      run: |
        uv run --no-sync pytest tests/unit/ -v --tb=short -o addopts="" --ignore=tests/unit/test_observability.py

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    # Only run on main/develop/PRs
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run security scan
      run: |
        uv run pip-audit

  claim-verification:
    name: Claim Verification Suite
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Install dependencies + build Rust extension
      run: |
        uv sync --extra dev --extra observability --extra excel --extra parquet --extra knowledge
        uv pip install maturin
        uv run maturin develop

    - name: Run claim verification tests
      run: |
        uv run pytest tests/verification/ -v --tb=short -o addopts=""

    - name: Verify all 83 claims have tests
      run: |
        uv run python tools/verify_claims_coverage.py

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [install-profiles, test, test-pandas-compat]
    # Only run on main/develop/PRs
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2

    - name: Install maturin
      run: pip install maturin

    - name: Build package
      run: |
        maturin build --release

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: target/wheels/
