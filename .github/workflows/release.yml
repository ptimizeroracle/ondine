name: Release Please

# IMPORTANT: Enable "Allow GitHub Actions to create and approve pull requests"
# in repository Settings → Actions → General
# OR use a Personal Access Token: token: ${{ secrets.RELEASE_TOKEN }}

on:
  push:
    branches:
      - main

concurrency:
  group: release-please-main
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
      - name: Release Please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          # Use PAT if GITHUB_TOKEN doesn't have PR creation permission
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: python
