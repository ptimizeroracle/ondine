name: Release to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to publish (for example: v1.4.0)"
        required: true
        type: string

concurrency:
  group: publish-pypi
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: Ondine  # Use the Ondine environment with PYPI_API_TOKEN

    steps:
    - name: Checkout release ref
      if: github.event_name == 'release'
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.release.tag_name }}

    - name: Checkout manual release tag
      if: github.event_name == 'workflow_dispatch'
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.release_tag }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Resolve release tag
      id: release_tag
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          TAG="${{ github.event.release.tag_name }}"
        else
          TAG="${{ inputs.release_tag }}"
        fi
        if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
          echo "Error: expected a SemVer-style tag starting with v, got: $TAG"
          exit 1
        fi
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"

    - name: Verify version matches release tag
      shell: bash
      run: |
        TAG="${{ steps.release_tag.outputs.tag }}"
        TAG_VERSION=${TAG#v}
        PACKAGE_VERSION=$(grep '^version = ' pyproject.toml | cut -d'"' -f2)
        if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
          echo "Error: Tag version ($TAG_VERSION) does not match package version ($PACKAGE_VERSION)"
          exit 1
        fi
        echo "✅ Version check passed: $TAG_VERSION"

    - name: Build package
      run: |
        uv build
        echo "📦 Built package:"
        ls -lh dist/

    - name: Verify package contents
      run: |
        echo "📋 Checking package contents..."
        tar -tzf dist/*.tar.gz | grep -E "(LICENSE|CHANGELOG|README)" || echo "Warning: Some docs missing"
        echo "✅ Package verification complete"

    - name: Publish to PyPI
      env:
        UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        echo "Publishing to PyPI..."
        uv publish

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-packages
        path: dist/
        retention-days: 30
